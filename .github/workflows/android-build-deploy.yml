name: Build Android APK

on:
  workflow_dispatch:
    inputs:
      versionName:
        description: Android version name shown to players
        required: false
        default: "1.0"
      releaseNotes:
        description: Update notes shown in the game
        required: false
        default: "New Symbiosis build is available."
  push:
    branches:
      - main

env:
  UNITY_EXE: C:\Program Files\Unity\Hub\Editor\6000.4.3f1\Editor\Unity.exe
  BUILD_OUTPUT_PATH: Builds/Android/symbiosis-latest.apk
  BUILD_VERSION_NAME: ${{ github.event.inputs.versionName || '1.0' }}
  BUILD_VERSION_CODE_OFFSET: 1000
  ANDROID_UPDATE_URL: http://91.99.176.77:8080/downloads/symbiosis-latest.apk
  PUBLIC_BASE_URL: http://91.99.176.77:8080
  RELEASE_NOTES: ${{ github.event.inputs.releaseNotes || 'New Symbiosis build is available.' }}
  SERVER_DOWNLOADS_PATH: ${{ secrets.SERVER_DOWNLOADS_PATH || '/opt/symbiosis/backend/downloads' }}

jobs:
  build-android:
    runs-on:
      - self-hosted
      - Windows
      - X64

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Cache Unity Library
        uses: actions/cache@v4
        with:
          path: Library
          key: Library-${{ runner.os }}-Android-${{ hashFiles('Assets/**', 'Packages/**', 'ProjectSettings/**') }}
          restore-keys: |
            Library-${{ runner.os }}-Android-

      - name: Check Required Secrets
        shell: powershell -NoProfile -ExecutionPolicy Bypass -Command ". '{0}'"
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
          SERVER_SSH_KEY: ${{ secrets.SERVER_SSH_KEY }}
          SERVER_SSH_KEY_B64: ${{ secrets.SERVER_SSH_KEY_B64 }}
        run: |
          if (-not (Test-Path $env:UNITY_EXE)) {
            Write-Error "Unity executable was not found at '$env:UNITY_EXE'. Install Unity 6000.4.3f1 Android module on this runner or update UNITY_EXE."
          }
          foreach ($name in @('SERVER_HOST', 'SERVER_USER', 'SERVER_SSH_KEY')) {
            if ([string]::IsNullOrWhiteSpace([Environment]::GetEnvironmentVariable($name))) {
              Write-Host "Secret availability:"
              Write-Host "SERVER_HOST present: $(-not [string]::IsNullOrWhiteSpace($env:SERVER_HOST))"
              Write-Host "SERVER_USER present: $(-not [string]::IsNullOrWhiteSpace($env:SERVER_USER))"
              Write-Host "SERVER_SSH_KEY present: $(-not [string]::IsNullOrWhiteSpace($env:SERVER_SSH_KEY))"
              Write-Error "$name secret is empty or missing in this repository or environment."
            }
          }
          Write-Host "Required runner tools and secrets are present."

      - name: Restore Android Keystore
        shell: powershell -NoProfile -ExecutionPolicy Bypass -Command ". '{0}'"
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if (-not [string]::IsNullOrWhiteSpace($env:ANDROID_KEYSTORE_BASE64)) {
            $keystorePath = Join-Path $env:RUNNER_TEMP 'android-release.keystore'
            [IO.File]::WriteAllBytes($keystorePath, [Convert]::FromBase64String($env:ANDROID_KEYSTORE_BASE64))
            "ANDROID_KEYSTORE_PATH=$keystorePath" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          } else {
            Write-Host "No Android keystore secret configured. Unity default signing will be used."
          }

      - name: Build APK
        shell: powershell -NoProfile -ExecutionPolicy Bypass -Command ". '{0}'"
        env:
          ANDROID_KEYSTORE_PASS: ${{ secrets.ANDROID_KEYSTORE_PASS }}
          ANDROID_KEY_ALIAS_NAME: ${{ secrets.ANDROID_KEY_ALIAS_NAME }}
          ANDROID_KEY_ALIAS_PASS: ${{ secrets.ANDROID_KEY_ALIAS_PASS }}
        run: |
          New-Item -ItemType Directory -Force -Path 'Builds/Android', 'Builds/Logs' | Out-Null
          $versionCode = [int]$env:BUILD_VERSION_CODE_OFFSET + [int]$env:GITHUB_RUN_NUMBER
          "BUILD_VERSION_CODE=$versionCode" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          & $env:UNITY_EXE `
            -batchmode `
            -quit `
            -projectPath $env:GITHUB_WORKSPACE `
            -buildTarget Android `
            -executeMethod AndroidCiBuild.BuildApk `
            -logFile "$env:GITHUB_WORKSPACE\Builds\Logs\UnityBuild.log"
          if ($LASTEXITCODE -ne 0) {
            if (Test-Path 'Builds/Logs/UnityBuild.log') {
              Get-Content 'Builds/Logs/UnityBuild.log' -Tail 250
            }
            exit $LASTEXITCODE
          }
          if (-not (Test-Path $env:BUILD_OUTPUT_PATH)) {
            Write-Error "Build did not create '$env:BUILD_OUTPUT_PATH'."
          }

      - name: Build Addressables Remote Content
        shell: powershell -NoProfile -ExecutionPolicy Bypass -Command ". '{0}'"
        run: |
          & $env:UNITY_EXE `
            -batchmode `
            -quit `
            -projectPath $env:GITHUB_WORKSPACE `
            -buildTarget Android `
            -executeMethod RemoteContentAddressablesSetup.BuildRemoteContent `
            -logFile "$env:GITHUB_WORKSPACE\Builds\Logs\AddressablesBuild.log"
          if ($LASTEXITCODE -ne 0) {
            if (Test-Path 'Builds/Logs/AddressablesBuild.log') {
              Get-Content 'Builds/Logs/AddressablesBuild.log' -Tail 250
            }
            exit $LASTEXITCODE
          }

      - name: Write Update Manifest
        shell: powershell -NoProfile -ExecutionPolicy Bypass -Command ". '{0}'"
        run: |
          $manifest = [ordered]@{
            latestVersion = $env:BUILD_VERSION_NAME
            latestVersionCode = [int]$env:BUILD_VERSION_CODE
            minimumVersionCode = 1
            forceUpdate = $false
            updateUrl = $env:ANDROID_UPDATE_URL
            releaseNotes = $env:RELEASE_NOTES
            builtAt = (Get-Date).ToUniversalTime().ToString('yyyy-MM-ddTHH:mm:ssZ')
            commit = $env:GITHUB_SHA
          }
          $json = $manifest | ConvertTo-Json -Depth 5
          $utf8NoBom = New-Object System.Text.UTF8Encoding($false)
          [IO.File]::WriteAllText((Join-Path $env:GITHUB_WORKSPACE 'Builds/Android/android-update.json'), $json, $utf8NoBom)
          Get-Content 'Builds/Android/android-update.json'

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: symbiosis-android-${{ github.run_number }}
          path: |
            Builds/Android/symbiosis-latest.apk
            Builds/Android/android-update.json
            Builds/Logs/UnityBuild.log
            Builds/Logs/AddressablesBuild.log
            ServerData/Android/**
          if-no-files-found: error

      - name: Upload APK To VPS
        shell: powershell -NoProfile -ExecutionPolicy Bypass -Command ". '{0}'"
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
          SERVER_SSH_KEY: ${{ secrets.SERVER_SSH_KEY }}
          SERVER_SSH_KEY_B64: ${{ secrets.SERVER_SSH_KEY_B64 }}
        run: |
          $deployLog = Join-Path $env:GITHUB_WORKSPACE 'Builds/Logs/DeployUpload.log'
          New-Item -ItemType Directory -Force -Path (Split-Path $deployLog) | Out-Null
          "Starting APK deploy at $(Get-Date -Format o)" | Set-Content -LiteralPath $deployLog -Encoding utf8
          $keyPath = Join-Path $env:RUNNER_TEMP 'symbiosis-server-key'
          $serverHost = $env:SERVER_HOST.Trim()
          $serverUser = $env:SERVER_USER.Trim()
          $serverDownloadsPath = $env:SERVER_DOWNLOADS_PATH.Trim()
          if (-not [string]::IsNullOrWhiteSpace($env:SERVER_SSH_KEY_B64)) {
            [IO.File]::WriteAllBytes($keyPath, [Convert]::FromBase64String($env:SERVER_SSH_KEY_B64.Trim()))
          } elseif ($env:SERVER_SSH_KEY -notmatch "BEGIN OPENSSH PRIVATE KEY") {
            [IO.File]::WriteAllBytes($keyPath, [Convert]::FromBase64String($env:SERVER_SSH_KEY.Trim()))
          } else {
            $sshKey = $env:SERVER_SSH_KEY.Trim() -replace "\\r\\n", "`n" -replace "\\n", "`n" -replace "`r`n", "`n"
            $sshKey | Set-Content -LiteralPath $keyPath -NoNewline -Encoding ascii
          }
          icacls $keyPath /inheritance:r /grant:r "$($env:USERNAME):(R)" *>&1 | Tee-Object -FilePath $deployLog -Append
          Write-Host "Deploy target: $serverUser@$serverHost"
          "Deploy target: $serverUser@$serverHost" | Add-Content -LiteralPath $deployLog -Encoding utf8
          $previousErrorActionPreference = $ErrorActionPreference
          $ErrorActionPreference = 'Continue'
          ssh -vvv -i $keyPath -o IdentitiesOnly=yes -o StrictHostKeyChecking=no -o BatchMode=yes -o ConnectTimeout=20 -o ServerAliveInterval=15 -o ServerAliveCountMax=2 "$serverUser@$serverHost" "mkdir -p '$serverDownloadsPath'" 2>&1 | Tee-Object -FilePath $deployLog -Append
          $sshExitCode = $LASTEXITCODE
          $ErrorActionPreference = $previousErrorActionPreference
          "Remote mkdir ssh exit code: $sshExitCode" | Add-Content -LiteralPath $deployLog -Encoding utf8
          if ($sshExitCode -ne 0) { throw "Remote mkdir failed with exit code $sshExitCode. See Builds/Logs/DeployUpload.log." }
          scp -i $keyPath -o IdentitiesOnly=yes -o StrictHostKeyChecking=no -o BatchMode=yes -o ConnectTimeout=20 `
            'Builds/Android/symbiosis-latest.apk' `
            'Builds/Android/android-update.json' `
            "${serverUser}@${serverHost}:$serverDownloadsPath/" *>&1 | Tee-Object -FilePath $deployLog -Append
          if ($LASTEXITCODE -ne 0) { throw "APK upload failed with exit code $LASTEXITCODE. See Builds/Logs/DeployUpload.log." }

      - name: Upload Deploy Diagnostic
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: deploy-diagnostic-${{ github.run_number }}
          path: Builds/Logs/DeployUpload.log
          if-no-files-found: ignore

      - name: Upload Addressables To VPS
        shell: powershell -NoProfile -ExecutionPolicy Bypass -Command ". '{0}'"
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
          SERVER_SSH_KEY: ${{ secrets.SERVER_SSH_KEY }}
          SERVER_SSH_KEY_B64: ${{ secrets.SERVER_SSH_KEY_B64 }}
        run: |
          if (-not (Test-Path 'ServerData/Android')) {
            Write-Host "No Addressables remote content was produced."
            exit 0
          }

          $keyPath = Join-Path $env:RUNNER_TEMP 'symbiosis-server-key'
          $serverHost = $env:SERVER_HOST.Trim()
          $serverUser = $env:SERVER_USER.Trim()
          $serverDownloadsPath = $env:SERVER_DOWNLOADS_PATH.Trim()
          if (-not [string]::IsNullOrWhiteSpace($env:SERVER_SSH_KEY_B64)) {
            [IO.File]::WriteAllBytes($keyPath, [Convert]::FromBase64String($env:SERVER_SSH_KEY_B64.Trim()))
          } elseif ($env:SERVER_SSH_KEY -notmatch "BEGIN OPENSSH PRIVATE KEY") {
            [IO.File]::WriteAllBytes($keyPath, [Convert]::FromBase64String($env:SERVER_SSH_KEY.Trim()))
          } else {
            $sshKey = $env:SERVER_SSH_KEY.Trim() -replace "\\r\\n", "`n" -replace "\\n", "`n" -replace "`r`n", "`n"
            $sshKey | Set-Content -LiteralPath $keyPath -NoNewline -Encoding ascii
          }
          icacls $keyPath /inheritance:r /grant:r "$($env:USERNAME):(R)" | Out-Null
          ssh -i $keyPath -o IdentitiesOnly=yes -o StrictHostKeyChecking=no -o BatchMode=yes -o ConnectTimeout=20 -o ServerAliveInterval=15 -o ServerAliveCountMax=2 "$serverUser@$serverHost" "mkdir -p '$serverDownloadsPath/addressables/Android'"
          $files = Get-ChildItem -Path 'ServerData/Android' -Recurse -File
          if ($files.Count -eq 0) {
            Write-Error "ServerData/Android exists but contains no files."
          }
          foreach ($file in $files) {
            $root = (Resolve-Path 'ServerData/Android').Path.TrimEnd('\')
            $relative = $file.FullName.Substring($root.Length + 1).Replace('\', '/')
            $remoteDir = [IO.Path]::GetDirectoryName($relative)
            if ([string]::IsNullOrWhiteSpace($remoteDir)) {
              $remoteDir = '.'
            } else {
              $remoteDir = $remoteDir.Replace('\', '/')
            }
            ssh -i $keyPath -o IdentitiesOnly=yes -o StrictHostKeyChecking=no -o BatchMode=yes -o ConnectTimeout=20 -o ServerAliveInterval=15 -o ServerAliveCountMax=2 "$serverUser@$serverHost" "mkdir -p '$serverDownloadsPath/addressables/Android/$remoteDir'"
            scp -i $keyPath -o IdentitiesOnly=yes -o StrictHostKeyChecking=no -o BatchMode=yes -o ConnectTimeout=20 `
              "$($file.FullName)" `
              "${serverUser}@${serverHost}:$serverDownloadsPath/addressables/Android/$relative"
          }

      - name: Verify VPS Files
        shell: powershell -NoProfile -ExecutionPolicy Bypass -Command ". '{0}'"
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
          SERVER_SSH_KEY: ${{ secrets.SERVER_SSH_KEY }}
          SERVER_SSH_KEY_B64: ${{ secrets.SERVER_SSH_KEY_B64 }}
        run: |
          $keyPath = Join-Path $env:RUNNER_TEMP 'symbiosis-server-key'
          $serverHost = $env:SERVER_HOST.Trim()
          $serverUser = $env:SERVER_USER.Trim()
          $serverDownloadsPath = $env:SERVER_DOWNLOADS_PATH.Trim()
          if (-not [string]::IsNullOrWhiteSpace($env:SERVER_SSH_KEY_B64)) {
            [IO.File]::WriteAllBytes($keyPath, [Convert]::FromBase64String($env:SERVER_SSH_KEY_B64.Trim()))
          } elseif ($env:SERVER_SSH_KEY -notmatch "BEGIN OPENSSH PRIVATE KEY") {
            [IO.File]::WriteAllBytes($keyPath, [Convert]::FromBase64String($env:SERVER_SSH_KEY.Trim()))
          } else {
            $sshKey = $env:SERVER_SSH_KEY.Trim() -replace "\\r\\n", "`n" -replace "\\n", "`n" -replace "`r`n", "`n"
            $sshKey | Set-Content -LiteralPath $keyPath -NoNewline -Encoding ascii
          }
          icacls $keyPath /inheritance:r /grant:r "$($env:USERNAME):(R)" | Out-Null
          ssh -i $keyPath -o IdentitiesOnly=yes -o StrictHostKeyChecking=no -o BatchMode=yes -o ConnectTimeout=20 -o ServerAliveInterval=15 -o ServerAliveCountMax=2 "$serverUser@$serverHost" "ls -lh '$serverDownloadsPath/symbiosis-latest.apk' '$serverDownloadsPath/android-update.json' && cat '$serverDownloadsPath/android-update.json' && find '$serverDownloadsPath/addressables/Android' -maxdepth 1 -type f 2>/dev/null | sort | tail -20"

      - name: Verify Public Download URLs
        shell: powershell -NoProfile -ExecutionPolicy Bypass -Command ". '{0}'"
        run: |
          $urls = @(
            "$env:PUBLIC_BASE_URL/updates/android",
            "$env:PUBLIC_BASE_URL/updates/android/status",
            "$env:PUBLIC_BASE_URL/downloads/symbiosis-latest.apk"
          )
          foreach ($url in $urls) {
            Write-Host "Checking $url"
            $response = Invoke-WebRequest -UseBasicParsing -Uri $url -TimeoutSec 20
            if ($response.StatusCode -lt 200 -or $response.StatusCode -ge 300) {
              Write-Error "$url returned HTTP $($response.StatusCode)"
            }
          }
