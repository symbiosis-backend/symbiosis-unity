name: Build FishNet Server

on:
  workflow_dispatch:

env:
  UNITY_EXE: C:\Program Files\Unity\Hub\Editor\6000.4.3f1\Editor\Unity.exe
  FISHNET_SERVER_TARGET: linux
  FISHNET_SERVER_OUTPUT_PATH: Builds/Server/Linux/SymbiosisServer.x86_64
  SERVER_RELEASES_PATH: ${{ secrets.FISHNET_SERVER_RELEASES_PATH || '/opt/symbiosis/fishnet-server/releases' }}

jobs:
  build-server:
    runs-on:
      - self-hosted
      - Windows
      - X64

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Check Required Tools And Secrets
        shell: powershell -NoProfile -ExecutionPolicy Bypass -Command ". '{0}'"
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
          SERVER_SSH_KEY: ${{ secrets.SERVER_SSH_KEY }}
          SERVER_SSH_KEY_B64: ${{ secrets.SERVER_SSH_KEY_B64 }}
        run: |
          if (-not (Test-Path $env:UNITY_EXE)) {
            Write-Error "Unity executable was not found at '$env:UNITY_EXE'."
          }
          foreach ($name in @('SERVER_HOST', 'SERVER_USER', 'SERVER_SSH_KEY')) {
            if ([string]::IsNullOrWhiteSpace([Environment]::GetEnvironmentVariable($name))) {
              Write-Error "$name secret is empty or missing."
            }
          }
          Write-Host "FishNet server build target: $env:FISHNET_SERVER_TARGET"

      - name: Build Dedicated Server
        shell: powershell -NoProfile -ExecutionPolicy Bypass -Command ". '{0}'"
        run: |
          New-Item -ItemType Directory -Force -Path 'Builds/Server/Linux', 'Builds/Logs' | Out-Null
          & $env:UNITY_EXE `
            -batchmode `
            -quit `
            -projectPath $env:GITHUB_WORKSPACE `
            -buildTarget StandaloneLinux64 `
            -executeMethod MahjongGame.EditorTools.FishNetServerBuild.BuildCiServer `
            -logFile "$env:GITHUB_WORKSPACE\Builds\Logs\FishNetServerBuild.log"
          if ($LASTEXITCODE -ne 0) {
            if (Test-Path 'Builds/Logs/FishNetServerBuild.log') {
              Get-Content 'Builds/Logs/FishNetServerBuild.log' -Tail 250
            }
            exit $LASTEXITCODE
          }
          if (-not (Test-Path $env:FISHNET_SERVER_OUTPUT_PATH)) {
            Write-Error "Build did not create '$env:FISHNET_SERVER_OUTPUT_PATH'."
          }

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: symbiosis-fishnet-server-${{ github.run_number }}
          path: |
            Builds/Server/**
            Builds/Logs/FishNetServerBuild.log
          if-no-files-found: error

      - name: Upload Server To VPS
        shell: powershell -NoProfile -ExecutionPolicy Bypass -Command ". '{0}'"
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
          SERVER_SSH_KEY: ${{ secrets.SERVER_SSH_KEY }}
        run: |
          $keyPath = Join-Path $env:RUNNER_TEMP 'symbiosis-server-key'
          $serverHost = $env:SERVER_HOST.Trim()
          $serverUser = $env:SERVER_USER.Trim()
          $serverReleasesPath = $env:SERVER_RELEASES_PATH.Trim()
          if (-not [string]::IsNullOrWhiteSpace($env:SERVER_SSH_KEY_B64)) {
            [IO.File]::WriteAllBytes($keyPath, [Convert]::FromBase64String($env:SERVER_SSH_KEY_B64.Trim()))
          } else {
            $sshKey = $env:SERVER_SSH_KEY.Trim() -replace "\\r\\n", "`n" -replace "\\n", "`n" -replace "`r`n", "`n"
            $sshKey | Set-Content -LiteralPath $keyPath -NoNewline -Encoding ascii
          }
          icacls $keyPath /inheritance:r /grant:r "$($env:USERNAME):(R)" | Out-Null
          Write-Host "Deploy target: $serverUser@$serverHost"
          $releasePath = "$serverReleasesPath/${{ github.run_number }}"
          ssh -i $keyPath -o IdentitiesOnly=yes -o StrictHostKeyChecking=no -o BatchMode=yes -o ConnectTimeout=20 -o ServerAliveInterval=15 -o ServerAliveCountMax=2 "$serverUser@$serverHost" "mkdir -p '$releasePath'"
          $files = Get-ChildItem -Path 'Builds/Server/Linux' -Recurse -File
          if ($files.Count -eq 0) {
            Write-Error "Builds/Server/Linux contains no files."
          }
          foreach ($file in $files) {
            $root = (Resolve-Path 'Builds/Server/Linux').Path.TrimEnd('\')
            $relative = $file.FullName.Substring($root.Length + 1).Replace('\', '/')
            $remoteDir = [IO.Path]::GetDirectoryName($relative)
            if ([string]::IsNullOrWhiteSpace($remoteDir)) {
              $remoteDir = '.'
            } else {
              $remoteDir = $remoteDir.Replace('\', '/')
            }
            ssh -i $keyPath -o IdentitiesOnly=yes -o StrictHostKeyChecking=no -o BatchMode=yes -o ConnectTimeout=20 -o ServerAliveInterval=15 -o ServerAliveCountMax=2 "$serverUser@$serverHost" "mkdir -p '$releasePath/$remoteDir'"
            scp -i $keyPath -o IdentitiesOnly=yes -o StrictHostKeyChecking=no -o BatchMode=yes -o ConnectTimeout=20 `
              "$($file.FullName)" `
              "${serverUser}@${serverHost}:$releasePath/$relative"
          }
          ssh -i $keyPath -o IdentitiesOnly=yes -o StrictHostKeyChecking=no -o BatchMode=yes -o ConnectTimeout=20 -o ServerAliveInterval=15 -o ServerAliveCountMax=2 "$serverUser@$serverHost" "chmod +x '$releasePath/SymbiosisServer.x86_64' && ln -sfn '$releasePath' '/opt/symbiosis/fishnet-server/current' && ls -lah '/opt/symbiosis/fishnet-server/current'"
